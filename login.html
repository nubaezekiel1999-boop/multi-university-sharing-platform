<!DOCTYPE html> 
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    margin:0;
    font-family: Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(
        135deg,
        green 0%,
        green 25%,
        black 25%,
        black 40%,
        yellow 40%,
        yellow 55%,
        blue 55%,
        blue 100%
    );
}

.box{
    background:white;
    padding:25px;
    width:320px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#0066ff;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#0044aa;
}

#msg{
    margin-top:10px;
    text-align:center;
    color:red;
}
</style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p>No account? <a href="register.html">Register</a></p>

    <p id="msg"></p>
</div>

<script>

const API = "http://localhost:3000";

function login(){

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!email || !password){
        document.getElementById("msg").innerText = "Please fill all fields";
        return;
    }

    if(user.is_blocked === 1){
    return res.json({ message: "Account blocked" });
}

    fetch(API + "/login", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("msg").innerText = data.message;

        // ✅ SUCCESS LOGIN
        if(data.token && data.user){

            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));

            setTimeout(() => {

                // 🔥 FLOW SAFI
                window.location.replace("dashboard.html");

            }, 800);
        }

    })
    .catch(() => {
        document.getElementById("msg").innerText = "Server error";
    });

}

</script>

</body>
</html>
