<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload Material</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* 🎓 CLEAN EDUCATION BACKGROUND */
    background:
    linear-gradient(135deg, rgba(0,0,0,0.75), rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") no-repeat center center/cover;
}

/* CARD */
.container{
    width:420px;
    padding:35px;
    border-radius:20px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(255,255,255,0.15);
    color:white;

    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* TITLE */
.title{
    text-align:center;
    font-size:26px;
    margin-bottom:25px;
    font-weight:bold;

    background: linear-gradient(90deg,#1fa12e,#00a3dd,#fcd116);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* DROP AREA */
.drop-area{
    border:2px dashed #00a3dd;
    padding:25px;
    text-align:center;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}

.drop-area:hover{
    background:rgba(255,255,255,0.05);
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.15);
    color:white;
}

input::placeholder{
    color:#ddd;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#1fa12e,#00a3dd);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* PROGRESS */
.progress{
    width:100%;
    height:6px;
    background:rgba(255,255,255,0.2);
    border-radius:50px;
    margin-top:10px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#00a3dd;
}

/* MESSAGE */
#msg{
    margin-top:10px;
    text-align:center;
    font-size:14px;
}

/* BACK */
.back{
    display:block;
    margin-top:15px;
    text-align:center;
    color:#fcd116;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2 class="title">📤 Upload Study Material</h2>

<div class="drop-area" onclick="chooseFile()">
    <p id="fileName">📁 Click or Drag File Here</p>
    <input type="file" id="file" hidden>
</div>

<input id="course" placeholder="Course Name">
<input id="university" placeholder="University Name">

<button onclick="upload()">Upload File</button>

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<p id="msg"></p>

<a href="dashboard.html" class="back">⬅ Back to Dashboard</a>

</div>

<script>

const API = "http://localhost:3000";
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location.href = "login.html";
}

function chooseFile(){
    document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        document.getElementById("fileName").innerText = "📄 " + file.name;
    }
});

function upload(){

    const fileInput = document.getElementById("file").files[0];

    if(!fileInput){
        document.getElementById("msg").innerText = "⚠️ Select a file first";
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput);
    formData.append("course", document.getElementById("course").value);
    formData.append("university", document.getElementById("university").value);
    formData.append("user_id", user.id);

    const token = localStorage.getItem("token");

    fetch(API + "/upload", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token
        },
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        if(data.message === "File uploaded successfully"){
            window.location.href = "files.html";
        } else {
            document.getElementById("msg").innerText = data.message;
        }

    })
    .catch(() => {
        document.getElementById("msg").innerText = "❌ Upload error";
    });
}

</script>

</body>
</html>
